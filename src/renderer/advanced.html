<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Simple Sim</title>
	<meta name="description" content="Simple Sim is a simple tool to simulate World of Warcraft fights">
</head>

<body>
	<header>
		<h1>Simple Sim</h1>
		<a href="index.html">
			<div>
				<h2>Simple mode</h2>
			</div>
		</a>
	</header>
	<nav>
		<ul>
			<li>
				<a href="#specConfiguration">Spec Configuration</a>
			</li>
			<li>
				<a href="#characterStats">Character</a>
			</li>
		</ul>
	</nav>
	<main role="main">
		<section id="specConfiguration">
			<div class="headerContainer">
				<h2>Spec Configuration</h2>
				<button id="collapseSpecConfiguration">Collapse</button>
			</div>
			<div id="specConfigurationContainer" class="collapsibleDiv">
				<label for="bloodDK">Blood Death Knight</label>
				<input type="radio" name="spec" id="bloodDK" value="bloodDeathKnight" class="specRadio dkspec"
					data-tooltip="Blood Death Knight" checked>

				<label for="frostDK">Frost Death Knight</label>
				<input type="radio" name="spec" id="frostDK" value="frostDeathKnight" class="specRadio dkspec"
					data-tooltip="Frost Death Knight">

				<label for="unholyDK">Unholy Death Knight</label>
				<input type="radio" name="spec" id="unholyDK" value="unholyDeathKnight" class="specRadio dkspec"
					data-tooltip="Unholy Death Knight">

				<label for="vengDH">Vengeance Demon Hunter</label>
				<input type="radio" name="spec" id="vengDH" value="vengDemonHunter" class="specRadio dhspec"
					data-tooltip="Vengeance Demon Hunter">

				<label for="havocDH">Havoc Demon Hunter</label>
				<input type="radio" name="spec" id="havocDH" value="havocDemonHunter" class="specRadio dhspec"
					data-tooltip="Havoc Demon Hunter">

				<label for="devourerDH">Devourer Demon Hunter</label>
				<input type="radio" name="spec" id="devourerDH" value="devourerDemonHunter" class="specRadio dhspec"
					data-tooltip="Devourer Demon Hunter">

				<label for="devEvoker">Devastation Evoker</label>
				<input type="radio" name="spec" id="devEvoker" value="devastationEvoker" class="specRadio evokerSpec"
					data-tooltip="Devastation Evoker">

				<label for="augEvoker">Augmenation Evoker</label>
				<input type="radio" name="spec" id="augEvoker" value="augmentationEvoker" class="specRadio evokerSpec"
					data-tooltip="Augmenation Evoker">

				<label for="presEvoker">Preservation Evoker</label>
				<input type="radio" name="spec" id="presEvoker" value="preservationEvoker" class="specRadio evokerSpec"
					data-tooltip="Preservation Evoker">

				<label for="BMhunter">Beast Mastery Hunter</label>
				<input type="radio" name="spec" id="BMhunter" value="beastMasteryHunter" class="specRadio hunterSpec"
					data-tooltip="Beast Mastery Hunter">

				<label for="MMhunter">Marksmanship Hunter</label>
				<input type="radio" name="spec" id="MMhunter" value="marksmanshipHunter" class="specRadio hunterSpec"
					data-tooltip="Marksmanship Hunter">

				<label for="survivalHunter">Survival Hunter</label>
				<input type="radio" name="spec" id="survivalHunter" value="survivalHunter" class="specRadio hunterSpec"
					data-tooltip="Survival Hunter">

				<label for="arcaneMage">Arcane Mage</label>
				<input type="radio" name="spec" id="arcaneMage" value="arcaneMage" class="specRadio mageSpec"
					data-tooltip="Arcane Mage">

				<label for="fireMage">Fire Mage</label>
				<input type="radio" name="spec" id="fireMage" value="fireMage" class="specRadio mageSpec"
					data-tooltip="Fire Mage">

				<label for="frostMage">Frost Mage</label>
				<input type="radio" name="spec" id="frostMage" value="frostMage" class="specRadio mageSpec"
					data-tooltip="Frost Mage">

				<label for="brewMonk">Brewmaster Monk</label>
				<input type="radio" name="spec" id="brewMonk" value="brewmasterMonk" class="specRadio monkSpec"
					data-tooltip="Brewmaster Monk">
				<label for="mistMonk">Mistweaver Monk</label>
				<input type="radio" name="spec" id="mistMonk" value="mistweaverMonk" class="specRadio monkSpec"
					data-tooltip="Mistweaver Monk">
				<label for="WWMonk">Windwalker Monk</label>
				<input type="radio" name="spec" id="WWMonk" value="windwalkerMonk" class="specRadio monkSpec"
					data-tooltip="Windwalker Monk">
				<label for="HPaladin">Holy Paladin</label>
				<input type="radio" name="spec" id="HPaladin" value="holyPaladin" class="specRadio paladinSpec"
					data-tooltip="Holy Paladin">
				<label for="protPaladin">Protection Paladin</label>
				<input type="radio" name="spec" id="protPaladin" value="protectionPaladin" class="specRadio paladinSpec"
					data-tooltip="Protection Paladin">
				<label for="retPaladin">Retribution Paladin</label>
				<input type="radio" name="spec" id="retPaladin" value="retributionPaladin" class="specRadio paladinSpec"
					data-tooltip="Retribution Paladin">
				<label for="discPriest">Dicipline Priest</label>
				<input type="radio" name="spec" id="discPriest" value="disciplinePriest" class="specRadio priestSpec"
					data-tooltip="Dicipline Priest">
				<label for="holyPriest">Holy Priest</label>
				<input type="radio" name="spec" id="holyPriest" value="holyPriest" class="specRadio priestSpec"
					data-tooltip="Holy Priest">
				<label for="shadowPriest">Shadow Priest</label>
				<input type="radio" name="spec" id="shadowPriest" value="shadowPriest" class="specRadio priestSpec"
					data-tooltip="Shadow Priest">

				<label for="assRogue">Assassination Rogue</label>
				<input type="radio" name="spec" id="assRogue" value="assasinationRogue" class="specRadio rogueSpec"
					data-tooltip="Assassination Rogue">

				<label for="outlawRogue">Outlaw Rogue</label>
				<input type="radio" name="spec" id="outlawRogue" value="outlawRogue" class="specRadio rogueSpec"
					data-tooltip="Outlaw Rogue">

				<label for="subRogue">Subtelty Rogue</label>
				<input type="radio" name="spec" id="subRogue" value="subteltyRogue" class="specRadio rogueSpec"
					data-tooltip="Subtelty Rogue">

				<label for="eleShaman">Elemental Shaman</label>
				<input type="radio" name="spec" id="eleShaman" value="elementalShaman" class="specRadio shamanSpec"
					data-tooltip="Elemental Shaman">

				<label for="enhShaman">Enhancement Shaman</label>
				<input type="radio" name="spec" id="enhShaman" value="enhancementShaman" class="specRadio shamanSpec"
					data-tooltip="Enhancement Shaman">

				<label for="restoShaman">Restoration Shaman</label>
				<input type="radio" name="spec" id="restoShaman" value="restorationShaman" class="specRadio shamanSpec"
					data-tooltip="Restoration Shaman">

				<label for="affLock">Affliction Warlock</label>
				<input type="radio" name="spec" id="affLock" value="afflictionWarlock" class="specRadio lockSpec"
					data-tooltip="Affliction Warlock">

				<label for="demoLock">Demonology Warlock</label>
				<input type="radio" name="spec" id="demoLock" value="demonologyWarlock" class="specRadio lockSpec"
					data-tooltip="Demonology Warlock">

				<label for="destroLock">Destruction Warlock</label>
				<input type="radio" name="spec" id="destroLock" value="destructionWarlock" class="specRadio lockSpec"
					data-tooltip="Destruction Warlock">

				<label for="armsWarr">Arms Warrior</label>
				<input type="radio" name="spec" id="armsWarr" value="armsWarrior" class="specRadio warrSpec"
					data-tooltip="Arms Warrior">

				<label for="furyWarr">Fury Warrior</label>
				<input type="radio" name="spec" id="furyWarr" value="furyWarrior" class="specRadio warrSpec"
					data-tooltip="Fury Warrior">

				<label for="protWarr">Protection Warrior</label>
				<input type="radio" name="spec" id="protWarr" value="protectionWarrior" class="specRadio warrSpec"
					data-tooltip="Protection Warrior">

				<label for="bearDruid">Guardian Druid</label>
				<input type="radio" name="spec" id="bearDruid" value="guardianDruid" class="specRadio druidSpec"
					data-tooltip="Guardian Druid">

				<label for="catDruid">Feral Druid</label>
				<input type="radio" name="spec" id="catDruid" value="feralDruid" class="specRadio druidSpec"
					data-tooltip="Feral Druid">

				<label for="restoDruid">Restoration Druid</label>
				<input type="radio" name="spec" id="restoDruid" value="restorationDruid" class="specRadio druidSpec"
					data-tooltip="Restoration Druid">

				<label for="boomyDruid">Balance Druid</label>
				<input type="radio" name="spec" id="boomyDruid" value="balanceDruid" class="specRadio druidSpec"
					data-tooltip="Balance Druid">

			</div>
		</section>
		<section id="characterStats">
			<div class="headerContainer">
				<h2>Character</h2>
				<button id="collapseCharacterStats">Collapse</button>
			</div>
			<div id="characterStatsContainer" class="collapsibleDiv">
				<div id="statInputs" class="inputAreas">
					<label for="levelInput" id="levelLabel">Level: </label>
					<input type="number" id="levelInput" value="90">
					<label for="primaryStatInput" id="primaryStatLabel">Primary stat: </label>
					<input type="number" id="primaryStatInput" value="500">
					<label for="armorStatInput" id="armorStatLabel"> Armor: </label>
					<input type="number" id="armorStatInput" value="500">
					<label for="staminaStatInput" id="staminaStatlabel">Stamina: </label>
					<input type="number" id="staminaStatInput" value="8000">
					<label for="critStatInput" id="critStatLabel">Crit: </label>
					<input type="number" id="critStatInput" value="300">
					<label for="hasteStatInput" id="hasteStatLabel">Haste: </label>
					<input type="number" id="hasteStatInput" value="300">
					<label for="masteryStatInput" id="masteryStatlabel">Mastery: </label>
					<input type="number" id="masteryStatInput" value="300">
					<label for="versatilityStatInput" id="versatilityStatLabel">Versatility: </label>
					<input type="number" id="versatilityStatInput" value="300">
					<label for="leechStatInput" id="leechStatLabel">Leech: </label>
					<input type="number" id="leechStatInput" value="0">
					<label for="parryStatInput" id="parryStatLabel">Parry: </label>
					<input type="number" id="parryStatInput" value="0">
					<label for="blockStatInput" id="blockStatLabel">Block: </label>
					<input type="number" id="blockStatInput" value="0">
					<label for="dodgeStatInput" id="dodgeStatLabel">Dodge: </label>
					<input type="number" id="dodgeStatInput" value="0">
				</div>
			</div>
		</section>
		<section id="shortcutDefinitions">
			<div class="headerContainer">
				<h2>Shortcuts</h2>
				<button id="collapseShortcutDefinitions">Collapse</button>
			</div>
			<div id="shortcutDefinitionsContainer" class="collapsibleDiv jsonEditor">
				<div id="shortcutSaveLoadSection">

				</div>
				<div id="shortcutTextEditSection" class="jsonTextEditor">
					<h3>Edit as json</h3>
					<label for="shortcutTextInput">Text Editor for shortcuts</label>
					<textarea id="shortcutTextInput" class="jsonInput"></textarea>
				</div>
				<div id="shortcutBlocklyEditSection" class="blocklyEditSection">
					<h3>Edit visually</h3>
					<div id="blocklyShortcutDiv" class="blocklyDiv"></div>
				</div>
			</div>
		</section>
	</main>
</body>

</html>
